<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - Cursos Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-graduation-cap me-2"></i>Cursos Online
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cursos.html">Cursos</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link position-relative" href="carrinho.html">
                            <i class="fas fa-shopping-cart"></i>
                            <span class="cart-count position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cartCount">0</span>
                        </a>
                    </li>
                    <li class="nav-item" id="authLinks">
                        <a class="nav-link" href="login.html">Entrar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <h2 class="mb-4">Meu Carrinho</h2>
                <div id="carrinhoContainer"></div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container">
            <div class="text-center">
                <p>&copy; 2024 Cursos Online - Todos os direitos reservados</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script>
        function carregarCarrinho() {
            const carrinho = getCarrinho();
            const container = document.getElementById('carrinhoContainer');
            
            if (carrinho.length === 0) {
                container.innerHTML = `
                    <div class="alert alert-info text-center">
                        <i class="fas fa-shopping-cart fa-3x mb-3"></i>
                        <h4>Seu carrinho está vazio!</h4>
                        <a href="cursos.html" class="btn btn-primary mt-3">Continuar Comprando</a>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="table-responsive"><table class="table table-bordered"><thead><tr><th>Curso</th><th>Preço</th><th>Quantidade</th><th>Subtotal</th><th>Ação</th></tr></thead><tbody>';
            let total = 0;
            
            carrinho.forEach(item => {
                const subtotal = item.preco * item.quantidade;
                total += subtotal;
                
                html += `
                    <tr>
                        <td>${item.nome}</td>
                        <td>R$ ${item.preco.toFixed(2).replace('.', ',')}</td>
                        <td>
                            <input type="number" class="form-control" value="${item.quantidade}" 
                                   style="width: 80px" min="1" 
                                   onchange="atualizarQuantidade(${item.id}, this.value)">
                        </td>
                        <td>R$ ${subtotal.toFixed(2).replace('.', ',')}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="removerDoCarrinho(${item.id})">
                                <i class="fas fa-trash"></i> Remover
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            html += `</tbody><tfoot><tr><td colspan="3" class="text-end"><strong>Total:</strong></td><td colspan="2"><strong>R$ ${total.toFixed(2).replace('.', ',')}</strong></td></tr></tfoot></table></div>`;
            html += `<div class="text-end mt-3">
                        <a href="cursos.html" class="btn btn-secondary">Continuar Comprando</a>
                        <button class="btn btn-success" onclick="irParaCheckout()">Finalizar Compra</button>
                     </div>`;
            
            container.innerHTML = html;
        }
        
        function atualizarQuantidade(cursoId, quantidade) {
            let carrinho = getCarrinho();
            const item = carrinho.find(i => i.id == cursoId);
            if (item) {
                item.quantidade = parseInt(quantidade);
                salvarCarrinho(carrinho);
                carregarCarrinho();
                atualizarCarrinhoCount();
            }
        }
        
        function irParaCheckout() {
            const usuario = localStorage.getItem('usuario');
            if (!usuario) {
                mostrarNotificacao('Você precisa estar logado para finalizar a compra!', 'error');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                return;
            }
            window.location.href = 'checkout.html';
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            carregarCarrinho();
            atualizarCarrinhoCount();
            verificarLogin();
        });
    </script>
</body>
</html>
